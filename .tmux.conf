set -g mouse on

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# use Ctrl + vim navigation for pane nav
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# vim copy-mode
set -g mode-keys vi
set -g status-keys vi
bind-key l copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# scroll 1 line at a time
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind-key -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# long history
set -g history-limit 20000

# transparent status bar
set -g status-style "bg=default"
set -g status-left-length 50

# status bar: just session name (left) and clock (right)
set -g status-right "%H:%M %d-%b"
set -g status-right-length 50
set -g window-status-current-format ""
set -g window-status-format ""

# WAR for Shift+Enter extended keys not working in tmux v3.5a
bind -n S-Enter  send-keys C-j            # "insert newline"

# session picker: refresh status prefixes then open native choose-tree
bind-key s 'run-shell "~/.claude/tmux-monitor/rename-windows.sh" ; choose-tree -Zs -O name'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# auto-restore sessions on tmux start
set -g @continuum-restore 'on'

# auto-save every 10 minutes
set -g @continuum-save-interval '10'

# restore pane contents
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
